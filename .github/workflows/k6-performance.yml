name: k6 Performance Test
on:
  push:
    branches:
      - main
jobs:
  performance-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load_test.js
          flags: --out json=test_results.json
